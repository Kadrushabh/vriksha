  VRIKSHA — Checkout Integration
  Paste the <script> block into your checkout.html
  ════════════════════════════════════════════════════
-->

<script>
// ── UPDATE THIS after Railway deployment ──────────
const BACKEND_URL = 'https://your-railway-url.railway.app';

// ── Cart helpers — adapt to your existing cart ────
function getCart() {
  return JSON.parse(localStorage.getItem('vriksha_cart') || '[]');
}
function getCartTotal() {
  return getCart().reduce((sum, i) => sum + (i.price * i.quantity), 0);
}

// ── Read checkout form ────────────────────────────
function getCustomer() {
  return {
    firstName: document.getElementById('first-name')?.value?.trim(),
    lastName:  document.getElementById('last-name')?.value?.trim(),
    email:     document.getElementById('email')?.value?.trim(),
    phone:     document.getElementById('phone')?.value?.trim(),
    address:   document.getElementById('address')?.value?.trim(),
    city:      document.getElementById('city')?.value?.trim(),
    state:     document.getElementById('state')?.value?.trim(),
    pincode:   document.getElementById('pincode')?.value?.trim()
  };
}

function validate(c) {
  const fields = ['firstName','lastName','email','phone','address','city','state','pincode'];
  for (const f of fields) {
    if (!c[f]) { alert(`Please fill: ${f.replace(/([A-Z])/g,' $1').toLowerCase()}`); return false; }
  }
  if (!/^\d{10}$/.test(c.phone))      { alert('Enter valid 10-digit phone'); return false; }
  if (!/^\d{6}$/.test(c.pincode))     { alert('Enter valid 6-digit pincode'); return false; }
  if (!/\S+@\S+\.\S+/.test(c.email)) { alert('Enter valid email'); return false; }
  if (!getCart().length)               { alert('Cart is empty'); return false; }
  return true;
}

// ── PhonePe Payment ───────────────────────────────
async function placeOrder() {
  const customer = getCustomer();
  if (!validate(customer)) return;

  const cart     = getCart();
  const subtotal = getCartTotal();
  const shipping = subtotal >= 499 ? 0 : 60;
  const total    = subtotal + shipping;

  const btn = document.getElementById('pay-btn');
  if (btn) { btn.disabled = true; btn.textContent = 'Redirecting to PhonePe…'; }

  try {
    const res = await fetch(`${BACKEND_URL}/api/payment/initiate`, {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        total, subtotal,
        shippingCharge: shipping,
        discount: 0,
        customer,
        cartItems: cart.map(i => ({
          productId:  i.id,
          name:       i.name,
          sku:        i.sku || i.id,
          quantity:   i.quantity,
          price:      i.price,
          totalPrice: i.price * i.quantity
        }))
      })
    });

    const data = await res.json();

    if (data.success && data.redirectUrl) {
      localStorage.removeItem('vriksha_cart');
      window.location.href = data.redirectUrl;  // → PhonePe payment page
    } else {
      alert('Error: ' + (data.error || 'Could not initiate payment'));
      if (btn) { btn.disabled = false; btn.textContent = 'Pay with PhonePe'; }
    }

  } catch (err) {
    alert('Connection error. Please try again.');
    if (btn) { btn.disabled = false; btn.textContent = 'Pay with PhonePe'; }
  }
}

// ── Cash on Delivery ──────────────────────────────
async function placeCODOrder() {
  const customer = getCustomer();
  if (!validate(customer)) return;

  const cart     = getCart();
  const subtotal = getCartTotal();
  const shipping = subtotal >= 499 ? 0 : 60;
  const total    = subtotal + shipping;

  const btn = document.getElementById('cod-btn');
  if (btn) { btn.disabled = true; btn.textContent = 'Placing order…'; }

  try {
    const res = await fetch(`${BACKEND_URL}/api/payment/cod-order`, {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        customer, subtotal,
        shippingCharge: shipping,
        discount: 0, total,
        cartItems: cart.map(i => ({
          productId: i.id, name: i.name, sku: i.sku || i.id,
          quantity: i.quantity, price: i.price,
          totalPrice: i.price * i.quantity
        }))
      })
    });
    const data = await res.json();
    if (data.success) {
      window.location.href = `/order-confirmed.html?order=${data.orderId}`;
    } else {
      alert('Error: ' + (data.error || 'Could not place order'));
      if (btn) { btn.disabled = false; btn.textContent = 'Cash on Delivery'; }
    }
  } catch (err) {
    alert('Error: ' + err.message);
    if (btn) { btn.disabled = false; btn.textContent = 'Cash on Delivery'; }
  }
}

// ── Pincode delivery check ────────────────────────
let pinTimer;
document.getElementById('pincode')?.addEventListener('input', function() {
  clearTimeout(pinTimer);
  if (this.value.length !== 6) return;
  pinTimer = setTimeout(async () => {
    const el = document.getElementById('delivery-info');
    if (!el) return;
    try {
      const res  = await fetch(`${BACKEND_URL}/api/payment/check-serviceability?pincode=${this.value}`);
      const data = await res.json();
      el.textContent = data.serviceable
        ? `✅ Delivery in ~${data.estimatedDays} days · ${data.cheapestRate === 0 ? 'Free shipping' : '₹'+data.cheapestRate}`
        : '❌ Delivery not available to this pincode';
      el.style.color = data.serviceable ? '#2D4A2D' : '#c0392b';
    } catch { el.textContent = ''; }
  }, 600);
});
</script>
